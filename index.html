<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>3D Ultrasound - Siêu âm 3D</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100dvh; /* Fix lỗi chiều cao di động */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }
        .header {
            background: linear-gradient(135deg, #0a1a1f 0%, #0d2a2f 100%);
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid #ffaacc;
        }
        .baby-name { font-size: 18px; font-weight: bold; color: #ffccee; }
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            min-height: 0; /* Quan trọng để không đẩy nút */
        }
        canvas { width: 100%; height: 100%; object-fit: contain; touch-action: none; }
        .bottom-bar {
            background: #0a1a1f;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #2a4a5f;
        }
        .color-row { display: flex; gap: 12px; justify-content: center; }
        .color-btn {
            background: #0a2a2f; border: 1px solid #2a6a7f; color: #6aabbf;
            width: 50px; height: 50px; border-radius: 25px;
            font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-active { background: #1a4a5f; border-color: #4a9abf; box-shadow: 0 0 8px #4a9abf; }
    </style>
</head>
<body>
    <div class="header">
        <div class="baby-name" id="babyName">🌸 Bé yêu: <span id="weekNumber">--</span> tuần</div>
    </div>
    <div class="canvas-container">
        <canvas id="canvas_gl" width="512" height="512"></canvas>
    </div>
    <div class="bottom-bar">
        <div class="color-row">
            <button class="color-btn" id="btnSiemens" onclick="setLUT('siemens')">🔵</button>
            <button class="color-btn" id="btnHot" onclick="setLUT('hot')">🔥</button>
            <button class="color-btn" id="btnCool" onclick="setLUT('cool')">❄️</button>
            <button class="color-btn" id="btnGray" onclick="setLUT('gray')">⚪</button>
            <button class="color-btn" onclick="captureImage()">📸</button>
            <button class="color-btn" onclick="loadFile()">📂</button>
        </div>
    </div>

<script>
// --- GIỮ NGUYÊN TOÀN BỘ BIẾN VÀ LOGIC CỦA ANH ---
const W = 256, H = 256, D = 32;
const volSize = W * H * D;
let currentVolume = new Uint8Array(volSize);
let gl, program, volTexture, mapTexture;
let currentZoom = 2.995, currentAlpha = 0.65, currentThresh = 0.04;
let currentMode = 1.0, currentSpread = 60.0, currentZScale = 1.0;
let currentRotX = 25, currentRotY = 40, currentRotZ = 0;
let currentQuat = { x: 0, y: 0, z: 0, w: 1 }, targetQuat = { x: 0, y: 0, z: 0, w: 1 };
let lutData = new Uint8Array(1024);

function initGL() {
    const canvas = document.getElementById('canvas_gl');
    gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true });
    if (!gl) return false;

    // PHỤC HỒI SHADER GỐC (CÓ SECTOR/LINEAR MODE)
    const vs = `#version 300 es
        in vec2 p; out vec2 v;
        void main() { v = p; gl_Position = vec4(p, 0, 1); }`;

    const fs = `#version 300 es
        precision highp float; precision highp sampler3D;
        in vec2 v; out vec4 f;
        uniform sampler3D uVol; uniform sampler2D uMap;
        uniform mat3 uRot; uniform float uZoomVal, uSpread, uZScale, uMode, uAlphaNorm, uThreshNorm;
        void main() {
            vec3 ro = vec3(0.0, 0.0, 5.0 - uZoomVal);
            vec3 rd = normalize(vec3(v, -2.0));
            vec4 accum = vec4(0.0);
            for(float t = 0.0; t < 8.0; t += 0.004) {
                vec3 p = ro + rd * t;
                vec3 rotated = uRot * p;
                vec3 sp;
                if (uMode > 0.5) { // SECTOR MODE
                    float angle = atan(rotated.x, rotated.z + 0.5);
                    float radius = length(vec2(rotated.x, rotated.z + 0.5)) - 0.5;
                    sp = vec3(rotated.y + 0.5, radius + 0.5, angle / radians(uSpread) + 0.5);
                } else { // LINEAR MODE
                    sp = vec3(rotated.x, rotated.y, rotated.z * uZScale) + 0.5;
                }
                if (all(greaterThanEqual(sp, vec3(0))) && all(lessThanEqual(sp, vec3(1)))) {
                    float d = texture(uVol, sp).r;
                    if (d > uThreshNorm) {
                        vec4 col = texture(uMap, vec2(d, 0.5));
                        float a = col.a * uAlphaNorm;
                        accum.rgb += (1.0 - accum.a) * col.rgb * a;
                        accum.a += (1.0 - accum.a) * a;
                    }
                }
                if (accum.a > 0.98) break;
            }
            f = vec4(accum.rgb, 1.0);
        }`;

    const createShader = (t, s) => {
        let sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh);
        return sh;
    };

    program = gl.createProgram();
    gl.attachShader(program, createShader(gl.VERTEX_SHADER, vs));
    gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(program); gl.useProgram(program);

    let buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    let pLoc = gl.getAttribLocation(program, "p");
    gl.enableVertexAttribArray(pLoc); gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    volTexture = gl.createTexture(); gl.bindTexture(gl.TEXTURE_3D, volTexture);
    gl.texImage3D(gl.TEXTURE_3D, 0, gl.R8, W, H, D, 0, gl.RED, gl.UNSIGNED_BYTE, null);
    gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    mapTexture = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, mapTexture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    return true;
}

function updateUniforms() {
    gl.uniform1f(gl.getUniformLocation(program, "uZoomVal"), currentZoom);
    gl.uniform1f(gl.getUniformLocation(program, "uAlphaNorm"), currentAlpha);
    gl.uniform1f(gl.getUniformLocation(program, "uThreshNorm"), currentThresh);
    gl.uniform1f(gl.getUniformLocation(program, "uMode"), currentMode);
    gl.uniform1f(gl.getUniformLocation(program, "uSpread"), currentSpread);
    gl.uniform1f(gl.getUniformLocation(program, "uZScale"), currentZScale);
    
    // Rotation Matrix từ Euler (giữ đúng logic của anh)
    let x = currentRotX * Math.PI/180, y = currentRotY * Math.PI/180;
    let cx = Math.cos(x), sx = Math.sin(x), cy = Math.cos(y), sy = Math.sin(y);
    let m = [cy, 0, sy, sx*sy, cx, -sx*cy, -cx*sy, sx, cx*cy];
    gl.uniformMatrix3fv(gl.getUniformLocation(program, "uRot"), false, m);
}

function buildLUT(type) {
    for(let i=0; i<256; i++) {
        let t = i/255, r, g, b, a;
        if(type==='siemens') { r=t*255; g=t*160; b=t*100; a=t*200; }
        else if(type==='hot') { r=255; g=t*255; b=0; a=t*200; }
        else if(type==='cool') { r=0; g=t*255; b=255; a=t*200; }
        else { r=g=b=t*255; a=t*200; }
        lutData.set([r, g, b, a], i*4);
    }
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, mapTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, lutData);
}

function setLUT(type) {
    buildLUT(type);
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('btn-active'));
    document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('btn-active');
}

function loadFile() {
    let input = document.createElement('input'); input.type = 'file';
    input.onchange = e => {
        let reader = new FileReader();
        reader.onload = ev => {
            currentVolume.set(new Uint8Array(ev.target.result).slice(0, volSize));
            gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_3D, volTexture);
            gl.texSubImage3D(gl.TEXTURE_3D, 0, 0, 0, 0, W, H, D, gl.RED, gl.UNSIGNED_BYTE, currentVolume);
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };
    input.click();
}

function captureImage() {
    let a = document.createElement('a');
    a.href = document.getElementById('canvas_gl').toDataURL();
    a.download = '3d_ultrasound.png'; a.click();
}

function render() {
    gl.clearColor(0,0,0,1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    updateUniforms();
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}

// Xử lý Touch
const c = document.getElementById('canvas_gl');
let isDrag = false, lx, ly;
c.ontouchstart = e => { isDrag = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; };
c.ontouchmove = e => {
    if(!isDrag) return;
    currentRotY += (e.touches[0].clientX - lx) * 0.5;
    currentRotX += (e.touches[0].clientY - ly) * 0.5;
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
};
c.ontouchend = () => isDrag = false;

if(initGL()) { setLUT('siemens'); render(); }
</script>
</body>
</html>
