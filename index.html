<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>3D Ultrasound - Siêu âm 3D</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #0a1a1f 0%, #0d2a2f 100%);
            padding: 12px 16px;
            text-align: center;
            border-bottom: 2px solid #ffaacc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .baby-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffccee;
            letter-spacing: 1px;
        }
        
        .baby-week {
            font-size: 14px;
            color: #ffaacc;
            margin-top: 4px;
        }
        
        .baby-week span {
            color: #ffdd99;
            font-weight: bold;
            font-size: 18px;
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            padding: 8px;
            min-height: 0;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            cursor: grab;
            touch-action: none;
        }
        
        canvas:active {
            cursor: grabbing;
        }
        
        .bottom-bar {
            background: #0a1a1f;
            padding: 12px 16px;
            border-top: 1px solid #2a4a5f;
        }
        
        .color-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 12px;
        }
        
        .color-btn {
            background: #0a2a2f;
            border: 1px solid #2a6a7f;
            color: #6aabbf;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.1s ease;
            touch-action: manipulation;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .color-btn:active {
            transform: scale(0.96);
            background: #1a4a5f;
        }
        
        .btn-active {
            background: #1a4a5f;
            border-color: #4a9abf;
            color: #c0e8ff;
            box-shadow: 0 0 8px #4a9abf;
        }
        
        .hint {
            text-align: center;
            font-size: 11px;
            color: #3a6a7f;
            margin-top: 8px;
        }

    </style>
</head>
<body>
    <div class="header" id="headerInfo">
        <div class="baby-name" id="babyName">🌸 Bé yêu của mẹ</div>
        <div class="baby-week" id="babyWeek">💖 <span id="weekNumber">--</span> tuần thai kỳ</div>
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas_gl" width="512" height="512"></canvas>
    </div>
    
    <div class="bottom-bar">
        <div class="color-row">
            <button class="color-btn" id="btnSiemens" onclick="setLUT('siemens')">🔵</button>
            <button class="color-btn" id="btnHot" onclick="setLUT('hot')">🔥</button>
            <button class="color-btn" id="btnCool" onclick="setLUT('cool')">❄️</button>
            <button class="color-btn" id="btnGray" onclick="setLUT('gray')">⚪</button>
            <button class="color-btn" onclick="captureImage()">📸 </button>
            <button class="color-btn" onclick="loadFile()">📂 </button>
        </div>
    </div>

<script>
// ========== CẤU HÌNH ==========
const W = 256, H = 256, D = 32;
const volSize = W * H * D;
const DB_NAME = 'Ultrasound3D';
const DB_VERSION = 1;
const STORE_NAME = 'volumeData';

let currentVolume = new Uint8Array(volSize);
let gl, program, volTexture, mapTexture;

// Tham số render
let currentZoom = 2.995;
let currentZoomPercent = 57;
let currentSpread = 60.0;
let currentZScale = 1.0;
let currentStep = 0.004;
let currentAlpha = 0.65;
let currentThresh = 0.04;
let currentMode = 1.0;
let currentSmooth = 0.7;
let currentDegRaw = 38;

// Góc xoay
let currentRotX = 25;
let currentRotY = 40;
let currentRotZ = 0;

// Thông tin bệnh nhân
let currentWeek = 24;
let currentPatientName = "Bé yêu";

// Cắt lớp
let cutX = 0, cutY = 0, cutZ = 0;

// Quaternion
let currentQuat = { x: 0, y: 0, z: 0, w: 1 };
let targetQuat = { x: 0, y: 0, z: 0, w: 1 };
let animFrameQuat = null;
let rotMatrix = [1,0,0, 0,1,0, 0,0,1];
let minTex = [0,0,0];
let maxTex = [1,1,1];
let lutData = new Uint8Array(1024);

// Touch/mouse (GIỐNG HỆT i4.html)
let initialDistance = 0;
let initialZoom = 0;
let isDragging = false;
let lastTouchX = 0, lastTouchY = 0;
let pendingDx = 0, pendingDy = 0;
let sendInterval = null;
let mouseDragging = false;
let lastMouseX = 0, lastMouseY = 0;

// ========== HÀM CẬP NHẬT ==========
function updateSpreadAndZScale() {
    if (currentMode > 0.5) {
        currentSpread = 10.0 + 130.0 * currentDegRaw / 100.0;
        currentZScale = 1.0;
    } else {
        currentZScale = 1.0 + 7.0 * currentDegRaw / 100.0;
        currentSpread = 60.0;
    }
    if(gl) {
        gl.uniform1f(gl.getUniformLocation(program, "uSpread"), currentSpread);
        gl.uniform1f(gl.getUniformLocation(program, "uZScale"), currentZScale);
    }
}

function updateRotationFromAngles() {
    targetQuat = eulerToQuat(currentRotX, currentRotY, currentRotZ);
    currentQuat = { ...targetQuat };
    updateRotationMatrix();
}

function updateHeaderInfo() {
    document.getElementById('babyName').innerHTML = `🌸 Bé yêu của ${currentPatientName}`;
    document.getElementById('weekNumber').innerHTML = currentWeek;
}

function updateCut() {
    minTex = [cutX / W, cutY / H, cutZ / D];
    maxTex = [(W - cutX) / W, (H - cutY) / H, (D - cutZ) / D];
    if (gl && program) {
        gl.uniform3fv(gl.getUniformLocation(program, "uMinClip"), minTex);
        gl.uniform3fv(gl.getUniformLocation(program, "uMaxClip"), maxTex);
    }
}

// ========== INDEXEDDB ==========
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
        };
    });
}

async function saveToIndexedDB() {
    try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        
        const data = {
            id: 'currentVolume',
            week: currentWeek,
            alpha: Math.round(currentAlpha * 100),
            thresh: Math.round(currentThresh * 100),
            cutX: cutX,
            cutY: cutY,
            cutZ: cutZ,
            rotX: Math.round(currentRotX * 255 / 360),
            rotY: Math.round(currentRotY * 255 / 360),
            rotZ: Math.round(currentRotZ * 255 / 360),
            zoom: currentZoomPercent,
            mode: Math.round(currentMode),
            degRaw: currentDegRaw,
            patientName: currentPatientName,
            volume: Array.from(currentVolume),
            timestamp: Date.now()
        };
        store.put(data);
        console.log('✅ Đã lưu vào IndexedDB');
    } catch (error) {
        console.error('Lỗi lưu:', error);
    }
}

async function loadFromIndexedDB() {
    try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get('currentVolume');
        return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result || null);
            request.onerror = () => reject(request.error);
        });
    } catch (error) {
        return null;
    }
}

async function restoreFromIndexedDB() {
    const savedData = await loadFromIndexedDB();
    
    if (savedData && savedData.volume) {
        currentVolume.set(savedData.volume);
        uploadVolume();
        
        if (savedData.week !== undefined) currentWeek = savedData.week;
        if (savedData.patientName !== undefined) currentPatientName = savedData.patientName;
        if (savedData.alpha !== undefined) currentAlpha = savedData.alpha / 100.0;
        if (savedData.thresh !== undefined) currentThresh = savedData.thresh / 100.0;
        if (savedData.zoom !== undefined) {
            currentZoomPercent = savedData.zoom;
            currentZoom = 1.0 + 3.5 * currentZoomPercent / 100.0;
        }
        if (savedData.mode !== undefined) currentMode = savedData.mode;
        if (savedData.degRaw !== undefined) currentDegRaw = savedData.degRaw;
        if (savedData.cutX !== undefined) cutX = savedData.cutX;
        if (savedData.cutY !== undefined) cutY = savedData.cutY;
        if (savedData.cutZ !== undefined) cutZ = savedData.cutZ;
        
        if (savedData.rotX !== undefined) {
            currentRotX = savedData.rotX * 360 / 255;
            currentRotY = savedData.rotY * 360 / 255;
            currentRotZ = savedData.rotZ * 360 / 255;
        }
        
        if(gl) {
            gl.uniform1f(gl.getUniformLocation(program, "uAlphaNorm"), currentAlpha);
            gl.uniform1f(gl.getUniformLocation(program, "uThreshNorm"), currentThresh);
            gl.uniform1f(gl.getUniformLocation(program, "uZoomVal"), currentZoom);
            gl.uniform1f(gl.getUniformLocation(program, "uMode"), currentMode);
        }
        
        updateSpreadAndZScale();
        updateCut();
        updateRotationFromAngles();
        updateHeaderInfo();
        
        return true;
    }
    return false;
}


// ========== WEBGL ==========
function initGL() {
    const canvas = document.getElementById('canvas_gl');
    gl = canvas.getContext('webgl2', { alpha: false, antialias: true, preserveDrawingBuffer: true });
    if (!gl) { alert("WebGL2 không hỗ trợ"); return false; }
    
    function createShader(type, source) {
        let shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error(gl.getShaderInfoLog(shader));
            return null;
        }
        return shader;
    }
    
    program = gl.createProgram();
    let vs = createShader(gl.VERTEX_SHADER, `#version 300 es
        in vec2 p;
        out vec2 v;
        void main() { v = p; gl_Position = vec4(p, 0, 1); }
    `);
    
    let fs = createShader(gl.FRAGMENT_SHADER, `#version 300 es
        precision highp float;
        precision highp sampler3D;
        precision highp sampler2D;
        in vec2 v;
        out vec4 f;
        uniform sampler3D uVol;
        uniform sampler2D uMap;
        uniform mat3 uRot;
        uniform float uZoomVal;
        uniform float uSpread;
        uniform float uZScale;
        uniform float uStepSize;
        uniform float uMode;
        uniform float uAspect;
        uniform float uAlphaNorm;
        uniform float uThreshNorm;
        uniform float uSmooth;
        uniform vec3 uMinClip;
        uniform vec3 uMaxClip;
        
        float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
        
        float sampleSmooth(vec3 pos, vec3 step) {
            float v0 = texture(uVol, pos).r;
            float vx = texture(uVol, pos + vec3(step.x, 0.0, 0.0)).r;
            float vy = texture(uVol, pos + vec3(0.0, step.y, 0.0)).r;
            float vz = texture(uVol, pos + vec3(0.0, 0.0, step.z)).r;
            float grad = (abs(vx - v0) + abs(vy - v0) + abs(vz - v0)) / 3.0;
            return mix(v0, v0 + grad * 0.5, uSmooth);
        }
        
        void main() {
            vec2 uv = v * vec2(uAspect, 1.0);
            vec3 ro = vec3(0.0, 0.0, 5.0 - uZoomVal);
            vec3 rd = normalize(vec3(uv, -2.0));
            vec4 accum = vec4(0.0);
            float jitter = hash(v) * uStepSize * 0.05;
            float tmax = 10.0;
            vec3 step = vec3(0.008, 0.008, 0.008);
            
            for(float t = jitter; t < tmax; t += uStepSize) {
                vec3 pos = ro + rd * t;
                vec3 rotated = uRot * pos;
                vec3 sp;
                if (uMode > 0.5) {
                    float angle = atan(rotated.x, rotated.z + 0.5);
                    float radius = length(vec2(rotated.x, rotated.z + 0.5)) - 0.5;
                    sp = vec3(rotated.y + 0.5, radius + 0.5, angle / radians(uSpread) + 0.5);
                } else {
                    vec3 scaled = vec3(rotated.x, rotated.y, rotated.z * uZScale);
                    sp = scaled + 0.5;
                }
                if (sp.x >= uMinClip.x && sp.x <= uMaxClip.x && 
                    sp.y >= uMinClip.y && sp.y <= uMaxClip.y && 
                    sp.z >= uMinClip.z && sp.z <= uMaxClip.z) {
                    float density = sampleSmooth(sp, step);
                    if (density > uThreshNorm) {
                        vec4 color = texture(uMap, vec2(density, 0.5));
                        float alpha = color.a * uAlphaNorm;
                        float smoothAlpha = 1.0 - pow(1.0 - alpha, 1.2);
                        float contrib = 1.0 - accum.a;
                        accum.rgb += contrib * color.rgb * smoothAlpha;
                        accum.a += contrib * smoothAlpha;
                    }
                }
                if (accum.a > 0.98) break;
            }
            vec3 finalColor = pow(accum.rgb, vec3(0.9));
            f = vec4(finalColor, 1.0);
        }
    `);
    
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    gl.useProgram(program);
    
    let buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    let posLoc = gl.getAttribLocation(program, "p");
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    
    volTexture = gl.createTexture();
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_3D, volTexture);
    gl.texImage3D(gl.TEXTURE_3D, 0, gl.R8, W, H, D, 0, gl.RED, gl.UNSIGNED_BYTE, currentVolume);
    gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    
    mapTexture = gl.createTexture();
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, mapTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, lutData);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    
    gl.uniform1i(gl.getUniformLocation(program, "uVol"), 0);
    gl.uniform1i(gl.getUniformLocation(program, "uMap"), 1);
    gl.uniform1f(gl.getUniformLocation(program, "uStepSize"), currentStep);
    gl.uniform1f(gl.getUniformLocation(program, "uSmooth"), currentSmooth);
    gl.uniform1f(gl.getUniformLocation(program, "uAspect"), 1.0);
    gl.uniform1f(gl.getUniformLocation(program, "uZoomVal"), currentZoom);
    gl.uniform1f(gl.getUniformLocation(program, "uAlphaNorm"), currentAlpha);
    gl.uniform1f(gl.getUniformLocation(program, "uThreshNorm"), currentThresh);
    gl.uniform1f(gl.getUniformLocation(program, "uMode"), currentMode);
    
    updateSpreadAndZScale();
    updateRotationFromAngles();
    updateCut();
    
    return true;
}

function uploadVolume() {
    if(!gl || !currentVolume) return;
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_3D, volTexture);
    gl.texSubImage3D(gl.TEXTURE_3D, 0, 0, 0, 0, W, H, D, gl.RED, gl.UNSIGNED_BYTE, currentVolume);
}

function updateLUT() {
    if(!gl) return;
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, mapTexture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, 256, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, lutData);
}

// ========== QUATERNION ==========
function eulerToQuat(xDeg, yDeg, zDeg) {
    let x = xDeg * Math.PI / 180, y = yDeg * Math.PI / 180, z = zDeg * Math.PI / 180;
    let cx = Math.cos(x * 0.5), sx = Math.sin(x * 0.5);
    let cy = Math.cos(y * 0.5), sy = Math.sin(y * 0.5);
    let cz = Math.cos(z * 0.5), sz = Math.sin(z * 0.5);
    return {
        x: sx * cy * cz + cx * sy * sz,
        y: cx * sy * cz - sx * cy * sz,
        z: cx * cy * sz + sx * sy * cz,
        w: cx * cy * cz - sx * sy * sz
    };
}

function quatToMatrix(q) {
    let xx = q.x * q.x, yy = q.y * q.y, zz = q.z * q.z;
    let xy = q.x * q.y, xz = q.x * q.z, yz = q.y * q.z;
    let wx = q.w * q.x, wy = q.w * q.y, wz = q.w * q.z;
    return [
        1 - 2*(yy + zz), 2*(xy - wz), 2*(xz + wy),
        2*(xy + wz), 1 - 2*(xx + zz), 2*(yz - wx),
        2*(xz - wy), 2*(yz + wx), 1 - 2*(xx + yy)
    ];
}

function updateRotationMatrix() {
    rotMatrix = quatToMatrix(currentQuat);
    if(gl) gl.uniformMatrix3fv(gl.getUniformLocation(program, "uRot"), false, rotMatrix);
}

function updateSmoothRotation() {
    let diff = Math.abs(currentQuat.x - targetQuat.x) + Math.abs(currentQuat.y - targetQuat.y) +
               Math.abs(currentQuat.z - targetQuat.z) + Math.abs(currentQuat.w - targetQuat.w);
    if (diff < 0.001) {
        if (animFrameQuat) { cancelAnimationFrame(animFrameQuat); animFrameQuat = null; }
        currentQuat = { ...targetQuat };
        updateRotationMatrix();
        return;
    }
    let t = 0.15;
    currentQuat.x += (targetQuat.x - currentQuat.x) * t;
    currentQuat.y += (targetQuat.y - currentQuat.y) * t;
    currentQuat.z += (targetQuat.z - currentQuat.z) * t;
    currentQuat.w += (targetQuat.w - currentQuat.w) * t;
    let len = Math.sqrt(currentQuat.x*currentQuat.x + currentQuat.y*currentQuat.y + 
                        currentQuat.z*currentQuat.z + currentQuat.w*currentQuat.w);
    if (len > 0.0001) { currentQuat.x /= len; currentQuat.y /= len; currentQuat.z /= len; currentQuat.w /= len; }
    updateRotationMatrix();
    animFrameQuat = requestAnimationFrame(updateSmoothRotation);
}

function applyRotation(dx, dy) {
    let sensitivity = 0.5;
    currentRotX = (currentRotX + dy * sensitivity) % 360;
    currentRotY = (currentRotY + dx * sensitivity) % 360;
    if (currentRotX < 0) currentRotX += 360;
    if (currentRotY < 0) currentRotY += 360;
    targetQuat = eulerToQuat(currentRotX, currentRotY, currentRotZ);
    if (!animFrameQuat) animFrameQuat = requestAnimationFrame(updateSmoothRotation);
}

// ========== LUT ==========
function buildLUT(type) {
    for(let i = 0; i < 256; i++) {
        const t = i / 255;
        let r, g, b, a;
        if(type === 'siemens') {
            if(t < 0.3) { r = g = b = a = 0; }
            else if(t < 0.6) { let t2 = (t - 0.3) / 0.3; r = 200 * t2; g = 100 * t2; b = 50 * t2; a = 150 * t2; }
            else { let t2 = (t - 0.6) / 0.4; r = 200 + 55 * t2; g = 100 + 155 * t2; b = 50 + 205 * t2; a = 150 + 105 * t2; }
        } else if(type === 'hot') {
            r = 255 * Math.min(1.0, t * 1.5);
            g = 255 * Math.min(1.0, t * 1.2);
            b = 255 * t;
            a = 180 * t + 20;
        } else if(type === 'cool') {
            r = 80 * t; g = 180 * t; b = 255 * t; a = 180 * t;
        } else {
            r = g = b = 255 * t; a = 200 * t;
        }
        lutData[i*4] = Math.min(255, Math.round(r));
        lutData[i*4+1] = Math.min(255, Math.round(g));
        lutData[i*4+2] = Math.min(255, Math.round(b));
        lutData[i*4+3] = Math.min(255, Math.round(a));
    }
    updateLUT();
}

function setActiveButton(activeId) {
    ['btnSiemens', 'btnHot', 'btnCool', 'btnGray'].forEach(id => {
        const btn = document.getElementById(id);
        if(btn) btn.classList.toggle('btn-active', id === activeId);
    });
}

function setLUT(type) {
    setActiveButton(`btn${type.charAt(0).toUpperCase() + type.slice(1)}`);
    buildLUT(type);
}

// ========== SET ZOOM - GIỐNG HỆT i4.html (KHÔNG GIỚI HẠN CỨNG) ==========
function setZoom(percent) {
    // Giới hạn mềm để tránh zoom quá xa hoặc quá gần
    let newPercent = Math.min(100, Math.max(0, percent));
    currentZoomPercent = newPercent;
    currentZoom = 1.0 + 3.5 * currentZoomPercent / 100.0;
    if(gl) gl.uniform1f(gl.getUniformLocation(program, "uZoomVal"), currentZoom);
    console.log('Zoom:', currentZoomPercent, '% ->', currentZoom.toFixed(2));
}

// ========== CHỤP ẢNH ==========
function captureImage() {
    const canvas = document.getElementById('canvas_gl');
    canvas.toBlob(blob => {
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `sieuam_be_yeu_${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(url);
    }, 'image/png');
}

// ========== NẠP FILE .bin ==========
function loadFile() {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = '.bin,.img';
    input.onchange = (e) => {
        let file = e.target.files[0];
        if (!file) return;
        
        let reader = new FileReader();
        reader.onload = async (ev) => {
            let buf = ev.target.result;
            let volData = new Uint8Array(buf);
            
            if(volData.length >= volSize) {
                currentVolume.set(volData.slice(0, volSize));
                uploadVolume();
                
                if (volData.length > volSize) {
                    try {
                        let offset = 0;
                        let week = volData[offset++];
                        let alpha = volData[offset++];
                        let thresh = volData[offset++];
                        let cutXVal = volData[offset++];
                        let cutYVal = volData[offset++];
                        let cutZVal = volData[offset++];
                        let rotX = volData[offset++];
                        let rotY = volData[offset++];
                        let rotZ = volData[offset++];
                        let zoom = volData[offset++];
                        let mode = volData[offset++];
                        let degRaw = volData[offset++];
                        let nameLen = volData[offset++];
                        let nameBytes = volData.slice(offset, offset + nameLen);
                        let patientName = new TextDecoder().decode(nameBytes);
                        
                        currentWeek = week;
                        currentPatientName = patientName || "Bé yêu";
                        currentAlpha = alpha / 100.0;
                        currentThresh = thresh / 100.0;
                        currentZoomPercent = zoom;
                        currentZoom = 1.0 + 3.5 * zoom / 100.0;
                        currentMode = mode;
                        currentDegRaw = degRaw;
                        cutX = cutXVal;
                        cutY = cutYVal;
                        cutZ = cutZVal;
                        
                        currentRotX = rotX * 360 / 255;
                        currentRotY = rotY * 360 / 255;
                        currentRotZ = rotZ * 360 / 255;
                        
                        if(gl) {
                            gl.uniform1f(gl.getUniformLocation(program, "uAlphaNorm"), currentAlpha);
                            gl.uniform1f(gl.getUniformLocation(program, "uThreshNorm"), currentThresh);
                            gl.uniform1f(gl.getUniformLocation(program, "uZoomVal"), currentZoom);
                            gl.uniform1f(gl.getUniformLocation(program, "uMode"), currentMode);
                        }
                        
                        updateSpreadAndZScale();
                        updateCut();
                        updateRotationFromAngles();
                        updateHeaderInfo();
                        
                    } catch(err) { console.log("Đọc file:", err); }
                }
                
                await saveToIndexedDB();
                
            } else {
                alert("File không đúng định dạng");
            }
        };
        reader.readAsArrayBuffer(file);
    };
    input.click();
}

// ========== TOUCH & MOUSE (GIỐNG HỆT i4.html) ==========
function handleTouchStart(e) {
    e.preventDefault();
    const touches = e.touches;
    if(touches.length === 1) {
        isDragging = true;
        lastTouchX = touches[0].clientX;
        lastTouchY = touches[0].clientY;
        if(sendInterval) clearInterval(sendInterval);
        sendInterval = setInterval(() => {
            if(pendingDx !== 0 || pendingDy !== 0) {
                applyRotation(pendingDx, pendingDy);
                pendingDx = 0;
                pendingDy = 0;
            }
        }, 16);
    } else if(touches.length === 2) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        initialDistance = Math.sqrt(dx*dx + dy*dy);
        initialZoom = currentZoomPercent;
        isDragging = false;
    }
}

function handleTouchMove(e) {
    e.preventDefault();
    const touches = e.touches;
    if(touches.length === 1 && isDragging) {
        const dx = touches[0].clientX - lastTouchX;
        const dy = touches[0].clientY - lastTouchY;
        if(Math.abs(dx) > 3 || Math.abs(dy) > 3) {
            pendingDx += dx * 0.8;
            pendingDy += dy * 0.8;
            pendingDx = Math.min(60, Math.max(-60, pendingDx));
            pendingDy = Math.min(60, Math.max(-60, pendingDy));
            lastTouchX = touches[0].clientX;
            lastTouchY = touches[0].clientY;
        }
    } else if(touches.length === 2) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        const distance = Math.sqrt(dx*dx + dy*dy);
        if(initialDistance > 0) {
            let scale = distance / initialDistance;
            let newZoom = initialZoom + (scale - 1) * 50;
            setZoom(Math.round(newZoom));
        }
    }
}

function handleTouchEnd(e) {
    e.preventDefault();
    isDragging = false;
    if(sendInterval) { clearInterval(sendInterval); sendInterval = null; }
    initialDistance = 0;
}

function handleMouseDown(e) {
    mouseDragging = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    const canvas = document.getElementById('canvas_gl');
    canvas.style.cursor = 'grabbing';
    if(sendInterval) clearInterval(sendInterval);
    sendInterval = setInterval(() => {
        if(pendingDx !== 0 || pendingDy !== 0) {
            applyRotation(pendingDx, pendingDy);
            pendingDx = 0; pendingDy = 0;
        }
    }, 16);
}

function handleMouseMove(e) {
    if(!mouseDragging) return;
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    if(Math.abs(dx) > 2 || Math.abs(dy) > 2) {
        pendingDx += dx * 0.6;
        pendingDy += dy * 0.6;
        pendingDx = Math.min(60, Math.max(-60, pendingDx));
        pendingDy = Math.min(60, Math.max(-60, pendingDy));
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    }
}

function handleMouseUp() {
    mouseDragging = false;
    const canvas = document.getElementById('canvas_gl');
    canvas.style.cursor = 'grab';
    if(sendInterval) { clearInterval(sendInterval); sendInterval = null; }
}

function handleWheel(e) {
    e.preventDefault();
    setZoom(currentZoomPercent + (e.deltaY > 0 ? -5 : 5));
}

// ========== RENDER ==========
function render() {
    if(!gl) return;
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
    uploadVolume();
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}

// ========== KHỞI TẠO ==========
async function init() {
   
    if(!initGL()) return;
    
    buildLUT('siemens');
    setActiveButton('btnSiemens');
    
    render();
    
    const restored = await restoreFromIndexedDB();
    if (!restored) {
        updateHeaderInfo();
        await saveToIndexedDB();
    }
    
    const canvas = document.getElementById('canvas_gl');
    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd);
    canvas.addEventListener('touchcancel', handleTouchEnd);
    canvas.addEventListener('mousedown', handleMouseDown);
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('wheel', handleWheel, { passive: false });
    canvas.style.cursor = 'grab';
}

init();
